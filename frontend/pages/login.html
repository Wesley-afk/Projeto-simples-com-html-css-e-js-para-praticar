<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/login.css" />
    <title>TrainLog</title>
  </head>
  <body>
    <div class="divLogin">
      <form class="formularioParaLogar">
        <img src="../../imgs/TrainLog.svg" alt="TrainLog" />
        <label class="nomeDeUsuario">Nome de usuário</label>
        <input type="text" name="nomeDoUsuario" required />

        <label class="senhaDoUsuario">Senha</label>
        <input
          type="password"
          name="senhaDoUsuario" 
          required
        />

        <button type="submit">Enviar</button>
      </form>
    </div>
    <script src="../js/login.js" defer></script>
  </body>
</html>
