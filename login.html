<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>TrainLog</title>
  </head>
  <body>
    <div class="divLogin">
      <form class="formularioParaLogar">
        <label>Nome de usuário</label>
        <input type="text" name="nomeDoUsuario" placeholder="Wesley" required />

        <label>Senha</label>
        <input 
          type="password"
          name="senhaDoUsuario"
          placeholder="123456"
          required
        />

        <button type="submit">Enviar</button>
      </form>
    </div>
    <script src="./login.js" defer></script>
  </body>
</html>
